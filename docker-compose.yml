version: '3'

services:
  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

  app:
    build: .
    expose:
      - "5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 200M

  redis:
    image: redis
    volumes:
      - redis-data:/data

volumes:
  redis-data:
